name: Terraform CI/CD

on:
  pull_request:
    branches:
      - main
    # paths:
      # - 'modules/**'
      # - '*.tf'        # 루트의 tf 파일 변경 감지
      # - '.github/workflows/**'
    paths-ignore:
      - '.github/**'
      - '*.md'
      - '.gitignore'
  push:
    branches:
      - main
    # paths:
      # - 'modules/**'
      # - '*.tf'
      # - '.github/workflows/**'
    paths-ignore:
      - '.github/**'
      - '*.md'
      - '.gitignore'

env:
  TF_VERSION: '1.5.7'
  AWS_REGION: 'ap-northeast-2'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # 깃허브 Secret에 등록 필요
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        # Plan 결과를 변수에 담지 않고 바로 파일로 저장하거나 로그로 확인
        # -no-color: 깃허브 코멘트에 넣기 위해 색상 코드 제거
        run: |
          terraform plan -no-color > plan.txt
        continue-on-error: false # Plan 실패 시 워크플로우 중단 (안전)

      # Plan 결과를 PR 댓글로 달기 (너무 길면 잘릴 수 있음)
      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            // 코멘트 길이 제한(65536자) 고려하여 최대 60000자까지만 자름
            const truncatedPlan = plan.length > 60000 ? plan.substring(0, 60000) + "\n... (Plan too long, check Action logs)" : plan;

            const output = `#### Terraform Plan 📖
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncatedPlan}
            \`\`\`

            </details>
            
            *Pushed by: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Notify Discord (Plan)
        if: always()
        run: ./.github/scripts/discord-noti.sh
        env:
          DISCORD_WEBHOOK: ${{  secrets.DISCORD_WEBHOOK_URL  }}
          NOTIFY_TYPE: 'plan'
          STATUS: ${{  job.status  }}
          RESULT_FILE: 'plan.txt'
          PR_NUMBER: ${{  github.event.pull_request.number  }}
          ACTOR: ${{  github.actor  }}
          BRANCH_INFO: "${{  github.head_ref  }} -> ${{  github.base_ref  }}"
          Action_URL: "${{  github.server_url  }}/${{  github.repository  }}/actions/runs/${{  github.run_id  }}"

  terraform-apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # needs: terraform-plan # (옵션) Plan 잡이 성공했는지 체크하진 않지만 의존성 명시 가능
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Notify Discord (Plan)
        if: always()
        run: ./.github/scripts/discord-noti.sh
        env:
          DISCORD_WEBHOOK: ${{  secrets.DISCORD_WEBHOOK_URL  }}
          NOTIFY_TYPE: 'apply'
          STATUS: ${{  job.status  }}
          RESULT_FILE: 'plan.txt'
          ACTOR: ${{  github.actor  }}
          BRANCH_INFO: "Main"
          Action_URL: "${{  github.server_url  }}/${{  github.repository  }}/actions/runs/${{  github.run_id  }}"