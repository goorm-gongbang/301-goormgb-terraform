name: Terraform CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'
      - '*.tf'
  push:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'
      - '*.tf'

env:
  TF_VERSION: '1.5.7'
  AWS_REGION: 'ap-northeast-2'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Plan - All Environments
        id: plan
        run: |
          PLAN_OUTPUT=""
          for env in shared dev prod ai; do
            echo "========== $env =========="
            cd environments/$env
            terraform init -input=false
            terraform validate
            PLAN_OUTPUT+="## $env\n\`\`\`\n$(terraform plan -no-color 2>&1)\n\`\`\`\n\n"
            cd ../..
          done
          echo "plan<<EOF" >> $GITHUB_OUTPUT
          echo -e "$PLAN_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan Results

            ${{ steps.plan.outputs.plan }}

            *Pushed by: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Apply - All Environments
        run: |
          # 순서: shared -> dev -> prod -> ai (의존성 순서)
          for env in shared dev prod ai; do
            echo "========== Applying $env =========="
            cd environments/$env
            terraform init -input=false
            terraform apply -auto-approve
            cd ../..
          done
